name: Release

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  package:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Build addon package
        run: |
          mkdir -p package/PACT
          cp PACT.toc package/PACT/
          cp PACT.lua package/PACT/
          cd package
          zip -r ../PACT.zip PACT

      - name: Upload package artifact
        uses: actions/upload-artifact@v4
        with:
          name: PACT
          path: PACT.zip

      - name: Publish GitHub release
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v2
        with:
          files: PACT.zip
